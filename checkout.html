<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - UrbanCart</title>
  <meta name="description" content="Checkout UrbanCart dengan validasi form, ringkasan pesanan, pengiriman, pembayaran, dan WhatsApp order.">
  <meta property="og:title" content="Checkout - UrbanCart">
  <meta property="og:description" content="Simulasi checkout via WhatsApp untuk UrbanCart.">
  <meta property="og:type" content="website">
  <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body data-page="checkout">
  <div id="site-header"></div>
  <main class="page">
    <section class="container page-title">
      <h1>Checkout</h1>
      <p>Lengkapi data pembeli, pilih pengiriman, lalu pesan melalui WhatsApp.</p>
    </section>
    <section class="container checkout-grid">
      <form class="content-card" id="checkoutForm" novalidate>
        <h2>Data Pembeli</h2>
        <div class="form-grid">
          <label>Nama lengkap<input name="name" type="text" autocomplete="name" required></label>
          <label>Nomor WhatsApp<input name="phone" type="tel" inputmode="numeric" required></label>
          <label>Email<input name="email" type="email" autocomplete="email" required></label>
          <label>Provinsi<input name="province" type="text" required></label>
          <label>Kota<input name="city" type="text" required></label>
          <label>Kecamatan<input name="district" type="text" required></label>
          <label>Alamat lengkap<textarea name="address" required></textarea></label>
          <label>Kode pos<input name="postal" type="text" inputmode="numeric" required></label>
          <label class="full">Catatan pesanan<textarea name="note"></textarea></label>
        </div>
        <h2>Metode Pengiriman</h2>
        <div class="radio-list" id="shippingMethods"></div>
        <h2>Metode Pembayaran</h2>
        <div class="radio-list" id="paymentMethods"></div>
        <div class="form-actions">
          <button class="btn btn-dark" type="submit">Pesan melalui WhatsApp</button>
          <a class="btn btn-ghost" href="cart.html">Kembali ke Keranjang</a>
        </div>
        <p class="form-message" id="checkoutMessage"></p>
      </form>
      <aside class="summary-card" id="checkoutSummary"></aside>
    </section>
  </main>
  <div id="site-footer"></div>
  <script src="js/products.js"></script>
  <script src="js/main.js"></script>
  <script src="js/checkout.js"></script>
</body>
</html>
